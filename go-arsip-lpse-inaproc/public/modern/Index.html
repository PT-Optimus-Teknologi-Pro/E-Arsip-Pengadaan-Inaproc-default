<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Arsip Pengadaan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h1>
      <img src="images/logo.png" alt="Logo" />
    </h1>
    <ul>
      <li>
        <img src="images/icon-dashboard.png" alt="Dashboard" />
        Dashboard
      </li>
      <li class="active">
        <img src="images/icon-login.png" alt="Login" />
        Login
      </li>
      <li>
        <img src="images/icon-register.png" alt="Registrasi" />
        Registrasi Akun
      </li>
      <li>
        <img src="images/icon-buku-tamu.png" alt="Buku Tamu" />
        Buku Tamu
      </li>
      <li>
        <img src="images/icon-feedback.png" alt="Feedback" />
        Feedback
      </li>
    </ul>
  </div>

  <!-- Konten Tengah -->
  <div class="main-content">
    <img src="images/tampilan-login.jpg" alt="Ilustrasi Arsip" />
  </div>

  <!-- Panel Login -->
  <div class="login-panel">
    <div class="login-box">
      <h2>Login</h2>
      <p>Sign in to continue.</p>
      <form>
        <input type="email" placeholder="email.gmail" required />
        <input type="password" placeholder="********" required />
        <button type="submit">Log in</button>
        <div class="small-links">
          <a href="#">Forgot Password?</a> |
          <a href="#">Signup!</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
