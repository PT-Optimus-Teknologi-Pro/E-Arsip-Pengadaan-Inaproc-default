{% extends "border.html" %}

{% block pagetitle %}
Form Reviu
{% endblock %}

{% block content %}
<div class="row align-items-center">
    <div class="col">
        <h2 class="page-title">Daftar Reviu</h2>
    </div>
    <div class="col-auto">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/home">Home</a></li>
            <li class="breadcrumb-item"><a href="/reviu">Daftar Reviu</a></li>
            <li class="breadcrumb-item active">Edit</li>
        </ol>
    </div>
</div>
    <div class="col-12 pt-2">
        <div class="card">
            {% include "alert.html" %}
            <form class="form-horizontal" action="{{ url }}" method="post">
                {% if reviu.ID > 0 %}
                <input type="hidden" name="ID" value="{{ reviu.ID }}">
                {% endif %}
                <div class="card-body">
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Bidang</label>
                        <div class="col-sm-9">
                            <select name="bidang" class="form-control" required>
                            {% for obj in bidanglist %}
                            <option value="{{ obj }}" {% if obj == reviu.Bidang %} selected {% endif %}">{{ obj }}</option>
                            {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Content</label>
                        <div class="col-sm-9">
                            <textarea name="content" class="form-control" required>{{ reviu.Content }}</textarea>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Opsi 1</label>
                        <div class="col-sm-9">
                            <input type="text" name="opsi1" class="form-control"  value="{{ reviu.Opsi1 }}" required/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Opsi 2</label>
                        <div class="col-sm-9">
                            <input type="text" name="opsi2" class="form-control"  value="{{ reviu.Opsi2 }}" required/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <div class="col-sm-9">
                        <button type="submit" class="btn btn-primary"><span style="width: 16px;" data-feather="save"></span> Submit</button>&nbsp;
                        <a href="/reviu" class="btn btn-secondary"><span style="width: 16px;" data-feather="arrow-left-circle"></span> Kembali</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
