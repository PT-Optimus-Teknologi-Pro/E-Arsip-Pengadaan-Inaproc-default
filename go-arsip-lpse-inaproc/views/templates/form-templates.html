{% extends "border.html" %}

{% block pagetitle %}
Form Template
{% endblock %}

{% block content %}
<div class="row align-items-center">
    <div class="col">
        <h2 class="page-title">Daftar Template</h2>
    </div>
    <div class="col-auto">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/home">Home</a></li>
            <li class="breadcrumb-item"><a href="/templates">Daftar Template</a></li>
            <li class="breadcrumb-item active">Edit</li>
        </ol>
    </div>
</div>
    <div class="col-12 pt-2">
        <div class="card">
            {% include "alert.html" %}
            <form class="form-horizontal" action="{{ url }}" method="post">
                {% if agency.ID > 0 %}
                <input type="hidden" name="ID" value="{{ templates.ID }}">
                {% endif %}
                <div class="card-body">
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Nama</label>
                        <div class="col-sm-9">
                            <input type="text" name="nama" class="form-control" value="{{ template.Nama }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Periode</label>
                        <div class="col-sm-9">
                            <div class="input-group">
                            <input type="text" name="periode_awal" class="form-control datepicker" value="{{ template.PeriodeAwal }}"/>
                            <span class="input-group-text">s/d</span>
                            <input type="text" name="periode_akhir" class="form-control datepicker" value="{{ template.PeriodeAkhir }}"/>
                            </div>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Variable</label>
                        <div class="col-sm-9">
                            <input type="text" name="variable" class="form-control" value="{{ template.Variable }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Template</label>
                        <div class="col-sm-9">
                            <textarea id="trumbowyg" name="content">{{template.Content}}</textarea>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <div class="col-sm-9">
                        <button type="submit" class="btn btn-primary"><span style="width: 16px;" data-feather="save"></span> Submit</button>&nbsp;
                        <a href="/templates" class="btn btn-secondary"><span style="width: 16px;" data-feather="arrow-left-circle"></span> Kembali</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
{% endblock %}

{% block script %}
<script>
$(document).ready(function() {
  $('#trumbowyg').trumbowyg();
});
    $(".datepicker").flatpickr({
        enableTime: true,
        dateFormat: "Y-m-d",
        defaultDate: "today",
    });
</script>
{% endblock %}
