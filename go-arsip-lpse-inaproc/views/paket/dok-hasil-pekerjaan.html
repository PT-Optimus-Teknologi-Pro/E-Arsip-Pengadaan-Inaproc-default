 {% if isPPK %}
 <form method="post" action="/hasil-pekerjaan/{{ paket.ID }}/upload" enctype="multipart/form-data">
     <div class="input-group mt-2">
         <input type="file" name="file" class="form-control form-control">
         <button type="submit" class="btn btn-success">Simpan</button>
     </div>
 </form>
 {% endif %}
 <table class="table mt-2" style="width: 70%;">
     <thead>
     <tr>
         <th>Filename</th>
         <th width="5%">
             {%if paket.DokPekerjaanList[0] != null %}
             <a href="/hasil-pekerjaan/{{ paket.ID }}/download" title="Download All">
             <i style="width: 16px;" data-feather="download"></i>
             </a>
             {% endif %}
         </th>
     </tr>
     </thead>
     <tbody>
     {% for obj in paket.DokPekerjaanList %}
     <tr>
         <td><a href="/download/{{ obj.Document.ID }}">{{ obj.Document.Filename }}</a></td>
         <td>
             {% if isPPK %}
             <a href="/paket/dok-paket/{{obj.ID}}/hapus" title="Hapus file" onclick="return confirm('apakah anda ingin menghapus file?')">
             <span style="width: 16px;" data-feather="trash-2" style="width: 16px;"></span></a>
             {% endif %}
         </td>
     </tr>
     {% endfor %}
     </tbody>
 </table>
