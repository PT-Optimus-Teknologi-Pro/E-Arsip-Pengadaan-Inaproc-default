{% extends "border.html" %}

{% block pagetitle %}
Daftar Persyaratan
{% endblock %}

{% block content %}
<div class="row align-items-center">
    <div class="col">
        <h2 class="page-title">Daftar Persyaratan</h2>
    </div>
    <div class="col-auto">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/home">Home</a></li>
            <li class="breadcrumb-item active">Daftar Persyaratan</li>
        </ol>
    </div>
</div>
    <div class="col-12 pt-2">
        <div class="card">
            <div class="card-body">
                {% include "alert.html" %}
                <table class="table table-bordered table-striped" id="table-data">
                    <thead>
                    <tr>
                        <th>Jenis</th>
                        <th>Metode</th>
                        <th width="15%">Periode Awal</th>
                        <th width="15%">Periode Akhir</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
                <a href="/checklist/edit" class="btn btn-sm btn-success"><span style="width: 16px;" data-feather="plus-circle"></span> Tambah</a>
            </div>
        </div>
    </div>
{% endblock %}

{% block script %}
<script>
new DataTable("#table-data", {
    ajax: '/checklist/data',
    processing: true,
    serverSide: true,
    columns: [
        {data : "jenis", render: function (data, type, row){
                return '<a href="/checklist/'+row["ID"]+'">'+jenisPengadaan(data)+'</a>';
            }
        },
        {data : "metode", render: function (data, type, row){
                return metode(data);
            }
        },
        {data : "periode_awal", render: function(data, type, row){
                if(type === "sort" || type === "type"){
                    return data;
                }
                if(data == '0001-01-01T00:00:00Z')
                  return '';
                return moment(data).format("MM-DD-YYYY");
            }
        },
        {data : "periode_akhir", render: function(data, type, row){
                if(type === "sort" || type === "type"){
                    return data;
                }
                if(data == '0001-01-01T00:00:00Z')
                  return '';
                return moment(data).format("MM-DD-YYYY");
            }
        },
        {% if isAdmin %}
        {data : "ID", title: "action", width : '5%',  render: function(data, type, row){
                return '<a href="/checklist/edit/'+data+'"><span style="width: 16px;" data-feather="edit"></span></a>&nbsp;' +
                    '<a href="/checklist/hapus/'+data+'"><span style="width: 16px;" data-feather="trash"></span></a>';
            }
        },
        {% endif %}
    ],
    aaSorting: [[0, 'desc']],
    drawCallback: function( settings ) {
        feather.replace();
    }
});
</script>
{% endblock %}
