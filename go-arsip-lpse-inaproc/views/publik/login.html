{% extends "border.html" %}

{% block pagetitle %}
Login
{% endblock %}

{% block content %}
<div class="row align-items-center">
    <div class="col">
        <h2 class="page-title">Login</h2>
    </div>
    <div class="col-auto">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/">Home</a></li>
          <li class="breadcrumb-item active">Login</li>
        </ol>
    </div>
</div>
<div class="pt-2">
    <div class="card">
        <div class="card-body">
            <div class="col-4 mx-auto">
                <h4 class="text-center mb-4">Sign in your account</h4>
                {% include "alert.html" %}
                <form action="/login" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label"><strong>User ID</strong></label>
                        <input type="text" class="form-control" placeholder="Username" name="userid" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><strong>Password</strong></label>
                        <input type="password" class="form-control" placeholder="Password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <img src="{{base64Image}}" />
                        <input type="hidden" name="token" value="{{token}}" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><strong>Captcha </strong></label>
                        <input type="text" class="form-control" name="captchaText" required>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary btn-block">Sign me in</button>
                    </div>
                </form>
            </div>
       </div>
    </div>
</div>
{% endblock %}
