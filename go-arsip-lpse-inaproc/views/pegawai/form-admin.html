
<div class="text-center pt-3 pb-3">
    <span class="db"><img src="assets/images/lpse-logo.png" alt="logo"/></span>
</div>
{% include "alert.html" %}
<form class="form-horizontal mt-3" action="/form-admin" method="post" enctype="multipart/form-data">
    <div class="row">
        <div class="col-12 pt-2">
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                      <span class="input-group-text bg-success text-white h-100"><i class="mdi mdi-account fs-4"></i></span>
                </div>
                <input type="text" name="peg_namauser" class="form-control form-control-lg" placeholder="Username" aria-label="Username" aria-describedby="basic-addon1" required/>
            </div>
            
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                      <span class="input-group-text bg-danger text-white h-100"><i class="mdi mdi-email fs-4"></i></span>
                </div>
                <input type="email" name="peg_email" class="form-control form-control-lg" placeholder="Email Address" aria-label="Username" aria-describedby="basic-addon1" required/>
            </div>
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                      <span class="input-group-text bg-warning text-white h-100"><i class="mdi mdi-lock fs-4"></i></span>
                </div>
                <input type="password" name="passw" class="form-control form-control-lg" placeholder="Password" aria-label="Password" aria-describedby="basic-addon1" required/>
            </div>
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                      <span class="input-group-text bg-info text-white h-100"><i class="mdi mdi-lock fs-4"></i></span>
                </div>
                <input type="password" name="passw2" class="form-control form-control-lg" placeholder=" Confirm Password" aria-label="Password" aria-describedby="basic-addon1" required/>
            </div>
        </div>
    </div>
    <div class="row border-top border-secondary">
        <div class="col-12 pt-2">
            <div class="form-group">
                <div class="pt-3 d-grid">
                    <button class="btn btn-block btn-lg btn-info" type="submit">
                        Sign Up
                    </button>
                </div>
            </div>
        </div>
    </div>
</form>
