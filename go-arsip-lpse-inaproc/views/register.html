{% extends "border.html" %}

{% block content %}
<div class="row align-items-center">
    <div class="col">
        <h2 class="page-title">Form Registrasi</h2>
    </div>
    <div class="col-auto">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/">Login</a></li>
            <li class="breadcrumb-item active">Form Registrasi</li>
        </ol>
    </div>
</div>
<div class="row">
    <div class="col-12 pt-2">
        <div class="card">
            {% include "alert.html" %}
            <form class="form-horizontal" action="/register" method="post"  enctype="multipart/form-data">
                <div class="card-body">
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2 text-end control-label col-form-label">Pengangkatan Menjadi</label>
                        <div class="col-sm-9">
                            <select name="usrgroup" class="form-control">
                                <option value="PP">PP</option>
                                <option value="PPK">PPK</option>
                                <option value="POKJA">POKJA</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Nama Pegawai</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_nama" class="form-control" value="{{ pegawai.PegNama }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">NIK</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_nik" class="form-control" value="{{ pegawai.PegNik }}" />
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">NIP/NRP</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_nip" class="form-control" value="{{ pegawai.PegNip }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">User ID</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_namauser" class="form-control" value="{{ pegawai.PegNamauser }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Password</label>
                        <div class="col-sm-9">
                            <input type="password" name="passw" class="form-control" />
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Alamat</label>
                        <div class="col-sm-9">
                            <textarea name="peg_alamat" class="form-control">{{ pegawai.PegAlamat }}</textarea>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Telepon</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_telepon" class="form-control" value="{{ pegawai.PegTelepon }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Email</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_email" class="form-control" value="{{ pegawai.PegEmail }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Pangkat</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_pangkat" class="form-control" value="{{ pegawai.PegPangkat }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Jabatan</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_jabatan" class="form-control" value="{{ pegawai.PegJabatan }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Golongan</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_golongan" class="form-control" value="{{ pegawai.PegGolongan }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">No Sertifikat PBJ</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_no_pbj" class="form-control" value="{{ pegawai.peg_no_pbj }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Nomor SK</label>
                        <div class="col-sm-9">
                            <input type="text" name="peg_no_sk" class="form-control" value="{{ pegawai.PegNoSk }}"/>
                        </div>
                    </div>
                    <div class="form-group mb-3 row">
                        <label class="col-sm-2  text-end control-label col-form-label">Masa Berlaku SK</label>
                        <div class="col-sm-9">
                            <input type="text" name="masa_berlaku" class="form-control datepicker" value="{{ pegawai.PegMasaBerlaku }}"/>
                        </div>
                    </div>
                        <p class="page-title">Mohon lengkapi persyaratan dokumen dibawah ini</p>
                        <div class="form-group mb-3 row">
                            <label class="col-sm-2  text-end control-label col-form-label">KTP</label>
                            <div class="col-sm-9">
                                <input type="file" name="ktp" class="form-control"/>
                            </div>
                        </div>
                        <div class="form-group mb-3 row">
                            <label class="col-sm-2  text-end control-label col-form-label">SK</label>
                            <div class="col-sm-9">
                                <input type="file" name="sk" class="form-control"/>
                            </div>
                        </div>
                        <div class="form-group mb-3 row">
                            <label class="col-sm-2  text-end control-label col-form-label">Sertifikat</label>
                            <div class="col-sm-9">
                                <input type="file" name="sertifikat" class="form-control"/>
                            </div>
                        </div>
                        <div class="form-group mb-3 row">
                            <label class="col-sm-2  text-end control-label col-form-label">Tanda Tangan</label>
                            <div class="col-sm-9">
                                <div class="signature-container">
                                    <div class="sig-pad-wrap">
                                        <div class="sig-line"></div>
                                        <canvas id="signature-pad" width="400" height="200"></canvas>
                                        <div class="sig-hint-wrap" id="sigHint">
                                            <div class="sig-arrow">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 13l5 5 5-5M12 18V6"/></svg>
                                            </div>
                                            <p class="sig-hint">Sign Here</p>
                                        </div>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-danger" id="clear">Clear</button>
                                </div>
                            </div>
                            <input type="hidden" id="ttd" name="ttd" value="">
                        </div>
                </div>
                <div class="border-top">
                    <div class="card-body">
                        <button type="submit" class="btn btn-primary  float-end">
                            <span style="width: 16px;" data-feather="save"></span> Submit
                        </button>
                        <a href="/" class="btn btn-secondary  text-white"><span style="width: 16px;" data-feather="arrow-left-circle"></span> Kembali</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block css %}
<style>
    .signature-container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        position: relative;
    }

    .sig-pad-wrap {
        position: relative;
        border: 2px dashed #0026B4;
        border-radius: 8px;
        background: #fff;
        padding: 10px;
        display: inline-block;
    }

    canvas {
        display: block;
        border: 1px solid #e5e7eb;
        background-color: #fff;
        cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>'), auto;
        position: relative;
        z-index: 2;
    }
    .sig-line {
        position: absolute;
        bottom: 50px;
        left: 20px;
        right: 20px;
        height: 2px;
        background: #eee;
        z-index: 1;
        pointer-events: none;
    }
    .sig-hint-wrap {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        z-index: 3;
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 1;
        visibility: visible;
    }
    .sig-hint-wrap.hidden {
        opacity: 0;
        visibility: hidden;
        transform: translate(-50%, -40%);
    }
    .sig-arrow {
        color: #000000;
        animation: pulsateArrow 1.5s infinite;
    }
    @keyframes pulsateArrow {
        0% { transform: translateY(0); opacity: 0.7; }
        50% { transform: translateY(-5px); opacity: 1; }
        100% { transform: translateY(0); opacity: 0.7; }
    }
    .sig-hint {
        color: #000000;
        font-size: 0.85rem;
        font-weight: 700;
        margin: 0;
    }
</style>
{% endblock %}

{% block script %}
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script>
    $(".datepicker").flatpickr({
        enableTime: true,
        dateFormat: "Y-m-d",
    });
    var signaturePad = new SignaturePad(document.getElementById('signature-pad'), {
        backgroundColor: 'rgba(128,128,128, 0)',
        penColor: 'rgb(0, 0, 0)'
    });
    function updateSigHint() {
        var hint = document.getElementById('sigHint');
        if (hint) {
            if (signaturePad.isEmpty()) {
                hint.classList.remove('hidden');
            } else {
                hint.classList.add('hidden');
            }
        }
    }

    signaturePad.addEventListener('afterUpdateStroke', updateSigHint);

    cancelButton.addEventListener('click', function (event) {
        signaturePad.clear();
        updateSigHint();
    });

    $("form").submit(function(){
        var imageData = signaturePad.toDataURL();
        document.getElementsByName("ttd")[0].setAttribute("value", imageData);
        return true;
    });
</script>
{% endblock %}
