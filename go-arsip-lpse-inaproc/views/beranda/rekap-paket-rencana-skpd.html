<dl class="row mb-3">
  <dt class="col-sm-3" style="font-weight:700;">Satuan Kerja</dt>
  <dd class="col-sm-9">{{namaSatker}}</dd>
  <dt class="col-sm-3" style="font-weight:700;">Bulan</dt>
  <dd class="col-sm-9">{{bulanLabel(bulan)}} {{tahun}}</dd>
</dl>
<div class="table-responsive">
  <table class="table table-sm table-rencana-paket" id="rekap-paket">
    <thead>
      <tr>
        <th>Kode RUP</th>
        <th>Nama Paket</th>
        <th>Tanggal Pemilihan</th>
        <th>Pagu</th>
      </tr>
    </thead>
    <tbody>
    {% for obj in paket %}
    <tr>
      <td>{{ obj.KdRup }}</td>
      <td>{{ obj.NamaPaket }}</td>
      <td>{{ obj.TglAwalPemilihan.Format() }}</td>
      <td>{{ rupiah(obj.Pagu) }}</td>
    </tr>
    {% endfor %}
    </tbody>
  </table>
</div>

<script>
  new DataTable('.table-rencana-paket', { scrollX: true, scrollCollapse: true });
</script>
