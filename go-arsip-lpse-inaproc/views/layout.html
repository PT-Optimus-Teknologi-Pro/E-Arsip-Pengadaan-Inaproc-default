<!DOCTYPE html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>e-Arsip Pengadaan</title>
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/lpse-icon.png"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap4.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.27.3/ui/trumbowyg.min.css" />
    <link rel="stylesheet" href="/modern/dashboard.css" />
    {% block css %}
    {% endblock %}
  </head>

  <body>
      <div class="container-fluid">
        <div class="row">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
               <div class="sidebar-sticky pt-3">
                    <img src="/modern/images/logo.png" alt="Logo" width="200" class="logo"/>
                    {% include "sidemenu.html" %}
                    <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
                    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                        <h4 class="h4">
                            {% block pagetitle %}{% endblock %}
                        </h4>
                        {% if group %}
                        <div class="btn-toolbar mb-2 mb-md-0">
                          <button class="btn btn-sm btn-outline-secondary dropdown-toggle mr-2" type="button" data-toggle="dropdown" aria-expanded="false">
                              <span style="width: 16px;" data-feather="user"></span> {{ name }}
                          </button>
                          <div class="dropdown-menu">
                              <a href="/profile" class="dropdown-item"><span style="width: 16px;" data-feather="user-check"></span><span class="ml-2">Profile </span></a>
                              <a href="/logout" class="dropdown-item"><span style="width: 16px;" data-feather="key"></span><span class="ml-2">Logout </span></a>
                          </div>
                        </div>
                        {% endif %}
                    </div>
                    {% block content %}{% endblock %}
                </main>
        </div>
      </div>
      <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.28.0/dist/feather.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.20/build/pdfmake.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.20/build/vfs_fonts.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/html-to-pdfmake/browser.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.2/moment.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.27.3/trumbowyg.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/Trumbowyg/2.27.3/plugins/indent/trumbowyg.indent.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/perfect-scrollbar@1.5.6/dist/perfect-scrollbar.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/metismenu@3.0.7/dist/metisMenu.min.js"></script>
      <script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
      <script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap4.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
      <script src="https://cdn.jsdelivr.net/npm/jquery-mask-plugin@1.14.16/dist/jquery.mask.min.js"></script>
      <script src="/modern/dashboard.js"></script>
      <script src="/js/app.js"></script>
        {% block script %}
        {% endblock %}
  </body>
</html>
