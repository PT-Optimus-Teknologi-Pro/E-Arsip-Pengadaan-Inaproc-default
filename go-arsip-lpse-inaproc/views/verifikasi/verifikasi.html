{% extends "border.html" %}

{% block pagetitle %}
Daftar Pengajuan
{% endblock %}

{% block content %}
<div class="row align-items-center">
    <div class="col">
        <h2 class="page-title">Daftar Pengajuan</h2>
    </div>
    <div class="col-auto">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/home">Home</a></li>
            <li class="breadcrumb-item active">Daftar Pengajuan</li>
        </ol>
    </div>
</div>
    <div class="col-12 pt-2">
        <div class="card">
            <div class="card-body">
                {% include "alert.html" %}
                    <table class="table table-bordered table-striped" id="table-data">
                        <thead>
                        <tr>
                            <th>Nama</th>
                            <th width="15%">NIP</th>
                            <th width="15%">Email</th>
                            <th width="15%">User ID</th>
                            <th width="10%">status</th>
                        </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
            </div>
        </div>
    </div>
    {% endblock %}

    {% block script %}
    <script>
        new DataTable("#table-data", {
            ajax: '/verifikasi/data',
            processing: true,
            serverSide: true,
            columns: [
                {data : "peg_nama", render : function(data, type, row){
                        return '<a href="/verifikasi/'+row["ID"]+'">'+data+'</a>'
                    }
                },
                {data : "peg_nip"},
                {data : "peg_email"},
                {data : "peg_namauser"},
                {data : "peg_status", render : function (data, type, row){
                        if(data == 0)
                            return 'Verifikasi'
                        else if (data == 1)
                            return 'Akun SPSE sudah dibuat'
                        else if (data == 2)
                            return 'Sudah Disetujui'
                        else if (data == 3)
                            return 'Ditolak'
                    }
                }
            ],
            aaSorting: [[0, 'desc']]
        });
    </script>
{% endblock %}
