<!DOCTYPE html>
<html lang="en" class="h-100">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>e-Arsip Pengadaan</title>
    
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon.png">
    <link href="/css/style.css" rel="stylesheet">

    <style>
        .error-page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: #e8ecf7;
        }
        .error-card {
            background: #ffffff;
            border: 0.5px solid #c7d0e8;
            border-radius: 12px;
            padding: 3rem 2.5rem;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(17,33,93,0.10);
        }
        .error-icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #e8ecf7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .error-code-num {
            font-size: 72px;
            font-weight: 700;
            color: #11215D;
            line-height: 1;
            margin: 0 0 0.5rem;
            letter-spacing: -2px;
        }
        .error-divider {
            width: 40px;
            height: 3px;
            background: #2563eb;
            margin: 1.25rem auto;
            border-radius: 2px;
        }
        .error-title-text {
            font-size: 18px;
            font-weight: 600;
            color: #11215D;
            margin: 0 0 0.5rem;
        }
        .error-desc-text {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin: 0 0 2rem;
        }
        .error-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #1a3272;
            background: #e8ecf7;
            border: 0.5px solid #a3b4d9;
            padding: 4px 12px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        .btn-back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            background: #11215D;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-back-home:hover {
            background: #1a3272;
            color: #ffffff;
            text-decoration: none;
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="error-page-wrap">
        <div class="error-card">

            <div class="error-icon-wrap">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="#11215D" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>

            <span class="error-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                403 Forbidden
            </span>

            <p class="error-code-num">403</p>

            <div class="error-divider"></div>

            <p class="error-title-text">Akses Ditolak</p>
            <p class="error-desc-text">Anda tidak memiliki izin untuk mengakses halaman atau sumber daya ini. Silakan hubungi administrator jika Anda merasa ini adalah kesalahan.</p>

            <a class="btn-back-home" href="/">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Kembali ke Beranda
            </a>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.28.0/dist/feather.min.js"></script>
    <script src="/modern/dashboard.js"></script>
</body>

</html>
